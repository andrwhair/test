name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prototype/app/package-lock.json

      - name: Install dependencies
        working-directory: prototype/app
        run: npm ci

      - name: Build
        working-directory: prototype/app
        run: npm run build

      # Assemble a staging directory that mirrors what gh-pages should look like:
      #   /prototype/app/  ← built React app
      #   /prototype/...   ← all other static prototype files (HTML, images, etc.)
      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/prototype

          # Copy all static prototype files, skipping the app's node_modules and dist
          rsync -a \
            --exclude='app/node_modules' \
            --exclude='app/dist' \
            --exclude='app/.DS_Store' \
            --exclude='.DS_Store' \
            prototype/ deploy/prototype/

          # Overlay the built React app output
          mkdir -p deploy/prototype/app
          cp -r prototype/app/dist/. deploy/prototype/app/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          # Keep files on gh-pages that aren't in this deploy (safe default)
          keep_files: false
